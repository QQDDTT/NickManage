services:
  dev-demo:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: dev-demo
    ports:
      - "8000:8000"
    volumes:
      - /home/nick/WorkSpace/demo:/workspace/demo:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nick-net
    # 容器保持运行
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2gb

networks:
  nick-net:
    external: true
