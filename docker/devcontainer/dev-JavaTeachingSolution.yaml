services:
  dev-JavaTeachingSolution:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: dev-JavaTeachingSolution
    ports:
      - "8005:8000"
    volumes:
      - /home/nick/WorkSpace/JavaTeachingSolution:/workspace/JavaTeachingSolution:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nick-net
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2gb

networks:
  nick-net:
    external: true
