services:
  dev-Evo-Holon:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: dev-Evo-Holon
    ports:
      - "8003:8000"
    volumes:
      - /home/nick/WorkSpace/Evo-Holon:/workspace/Evo-Holon:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nick-net
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2gb

networks:
  nick-net:
    external: true
