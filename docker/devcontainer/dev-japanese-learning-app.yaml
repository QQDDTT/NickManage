services:
  dev-japanese-learning-app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: dev-japanese-learning-app
    ports:
      - "8008:8000"
    volumes:
      - /home/nick/WorkSpace/japanese-learning-app:/workspace/japanese-learning-app:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nick-net
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2gb

networks:
  nick-net:
    external: true
