services:
  dev-Graph-Weave:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: dev-Graph-Weave
    ports:
      - "8004:8000"
    volumes:
      - /home/nick/WorkSpace/Graph-Weave:/workspace/Graph-Weave:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nick-net
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2gb

networks:
  nick-net:
    external: true
