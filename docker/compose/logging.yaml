# 日志收集服务：Loki + Grafana + Promtail
# 用途：收集宿主机及所有开发容器的运行日志
# 启动方式：由 systemd 服务 docker-logging.service 管理，开机自动启动

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: always
    user: root
    ports:
      - "3100:3100"
    volumes:
      - /home/nick/WorkSpace/logs/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: always
    user: root
    ports:
      - "3000:3000"
    volumes:
      - /home/nick/WorkSpace/logs/grafana:/var/lib/grafana
    env_file:
      - ../env/logging.env
    depends_on:
      - loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /home/nick/WorkSpace/logs/promtail:/etc/promtail
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
