# k3s 单节点 Kubernetes 集群
# 用途：宿主机开发环境下的 k3s server 容器（单节点 server + agent 一体）
# 启动方式：由 systemd 服务 docker-k3s.service 管理，开机自动启动
# 注意：
#   - kubeconfig 写入宿主机 ~/.kube/config，供 devcontainer 只读挂载
#   - 需要 privileged 权限及 cgroupv2 支持

services:
  k3s:
    image: rancher/k3s:v1.32.2-k3s1
    container_name: k3s
    restart: always
    privileged: true
    command: server
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/config
      - K3S_KUBECONFIG_MODE=644
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - /home/nick/.kube:/output
    ports:
      - "6443:6443"
      - "80:80"
      - "443:443"
    tmpfs:
      - /run
      - /var/run
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=k3s"

  redis:
    image: redis:7-alpine
    container_name: nickmanage-redis
    restart: unless-stopped
    ports:
      - "6379:6379" # 宿主机端口:容器端口（k3s Pod 通过宿主机 IP 访问）
    command:
      - redis-server
      - --appendonly
      - "yes" # AOF 持久化：重启后队列数据不丢失
      - --appendfsync
      - everysec # 每秒刷盘，兼顾性能与持久性
      - --maxmemory
      - "512mb" # 内存上限，根据宿主机调整
      - --maxmemory-policy
      - allkeys-lru # 超限时淘汰最久未用的 key
    volumes:
      - redis-data:/data # 持久化队列数据
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=redis"

volumes:
  k3s-server:
    name: k3s-server
  redis-data:
    name: nickmanage-redis-data
