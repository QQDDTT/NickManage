# Graph-Weave 开发容器
# 技术栈：Rust（稳定版工具链）
# 用途：Graph-Weave Rust 开发环境，bind mount 项目目录，日志接入 Loki

services:
  graph-weave-dev:
    build:
      context: ../devcontainer
      dockerfile: Graph-Weave.Dockerfile
    container_name: graph-weave-dev
    volumes:
      - /home/nick/WorkSpace/Graph-Weave:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=graph-weave"
