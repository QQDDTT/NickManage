# Evo-Holon 开发容器
# 技术栈：Rust（核心 DSL 引擎）+ Node.js 20（TypeScript/Vite 前端）+ Python 3（PyO3 桥接）
# 用途：Evo-Holon 全栈开发环境，bind mount 项目目录，日志接入 Loki

services:
  evo-holon-dev:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: evo-holon-dev
    volumes:
      - /home/nick/WorkSpace/Evo-Holon:/workspace:cached
    working_dir: /workspace
    command: >
      /bin/bash -c "
      for i in {1..60}; do
        if ps ax | grep -iE 'vscode-server|cursor|antigravity' | grep -v grep > /dev/null; then break; fi;
        sleep 2;
      done;
      while ps ax | grep -iE 'vscode-server|cursor|antigravity' | grep -v grep > /dev/null; do
        sleep 5;
      done;
      sleep 5;
      exit 0;
      "
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=evo-holon"
