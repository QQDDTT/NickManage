services:
  # 共享层：Whisper 语音转文字服务
  whisper:
    image: mioyisama/whisper-server:latest
    container_name: share-whisper
    labels:
      - "nms.collect=true"
      - "nms.layer=share"
      - "nms.proxy=false"
    env_file: .env
    restart: always
    ports:
      - "5006:8080"
    volumes:
      - ${MNG_HOME}/volumes/share/whisper:/models
    command:
      - "-m"
      - "/models/${WHISPER_MODEL_PATH}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    deploy:
      resources:
        reservations:
          memory: 1G
    oom_score_adj: -200
    networks:
      - nms

networks:
  nms:
    external: true
