# japanese-learning-app 开发容器
# 技术栈：Python 3.12（后端/AI）+ Node.js 20（TypeScript 前端）
# 用途：日语学习应用全栈开发环境，bind mount 项目目录，日志接入 Loki

services:
  japanese-learning-app-dev:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: japanese-learning-app-dev
    volumes:
      - /home/nick/WorkSpace/japanese-learning-app:/workspace:cached
    working_dir: /workspace
    command: >
      /bin/bash -c "
      for i in {1..60}; do
        if ps ax | grep -iE 'vscode-server|cursor|antigravity' | grep -v grep > /dev/null; then break; fi;
        sleep 2;
      done;
      while ps ax | grep -iE 'vscode-server|cursor|antigravity' | grep -v grep > /dev/null; do
        sleep 5;
      done;
      sleep 5;
      exit 0;
      "
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=japanese-learning-app"
