services:
  # 共享层：Llama.cpp 大语言模型服务
  # AI 服务采用 Bind Mount，模型目录指向 /home/nick/NickManage/mounts/share/models
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: share-llamacpp
    labels:
      - "nms.collect=true"
      - "nms.layer=share"
      - "nms.proxy=false"
    env_file: .env
    restart: always
    ports:
      - "5004:8080"
    volumes:
      - ${MNG_HOME}/volumes/share/llamacpp:/models
    command:
      - "-m"
      - "/models/${LLM_MODEL_PATH}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--threads"
      - "2"
    deploy:
      resources:
        # 降低内存预留至 1.5G
        reservations:
          memory: 1536M
    oom_score_adj: -200
    networks:
      - nms

networks:
  nms:
    external: true
