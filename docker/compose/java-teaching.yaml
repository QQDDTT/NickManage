# JavaTeachingSolution 开发容器
# 技术栈：Java 17（Eclipse Temurin JDK）+ Maven 3
# 用途：Java 教学项目开发环境，bind mount 项目目录，日志接入 Loki

services:
  java-teaching-dev:
    build:
      context: ../devcontainer
      dockerfile: JavaTeachingSolution.Dockerfile
    container_name: java-teaching-dev
    volumes:
      - /home/nick/WorkSpace/JavaTeachingSolution:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=java-teaching"
