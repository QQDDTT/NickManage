services:
  # 共享层：BGE-M3 向量嵌入服务 (Embedding)
  # 使用 llama.cpp server 镜像来加载 GGUF 格式的嵌入模型
  embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: share-embedding
    labels:
      - "nms-bridge.collect=true"
      - "nms-bridge.layer=share"
      - "nms-bridge.proxy=false"
    env_file: .env
    restart: always
    ports:
      - "5009:8080"
    volumes:
      - ${MNG_HOME}/volumes/share/embedding:/models
    command:
      - "-m"
      - "/models/${EMBEDDING_MODEL_PATH}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--embedding"
      - "--threads"
      - "2"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    oom_score_adj: -200
    networks:
      - nms-bridge

networks:
  nms-bridge:
    external: true
