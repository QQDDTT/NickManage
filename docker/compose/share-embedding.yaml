services:
  # 共享层：BGE-M3 向量嵌入服务 (Embedding)
  # 使用 llama.cpp server 镜像来加载 GGUF 格式的嵌入模型
  embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: share-embedding
    labels:
      - "nms.collect=true"
      - "nms.layer=share"
      - "nms.proxy=false"
    env_file: .env
    restart: always
    ports:
      - "5009:8080"
    volumes:
      - ${MNG_HOME}/volumes/share/embedding:/models
    command:
      - "-m"
      - "/models/${EMBEDDING_MODEL_PATH}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--embedding"
      - "--threads"
      - "2"
    deploy:
      resources:
        # 预期占用 512MB
        reservations:
          memory: 512M
    oom_score_adj: -200
    networks:
      - nms

networks:
  nms:
    external: true
