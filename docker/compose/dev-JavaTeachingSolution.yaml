services:
  dev-JavaTeachingSolution:
    image: ubuntu:24.04
    container_name: dev-JavaTeachingSolution
    hostname: dev-JavaTeachingSolution
    labels:
      - "nms.collect=false"
      - "nms.layer=dev"
      - "nms.proxy=false"
    env_file: .env
    
    # --- 1. 权限与内核安全解锁 ---
    privileged: true
    security_opt:
      - seccomp:unconfined
    pid: "host" 

    # --- 2. 资源保障 (核心修复) ---
    deploy:
      resources:
        limits:
          memory: 4096M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    ports:
      - "8005:8000"

    # --- 3. 环境变量优化 ---
    environment:
      - PROJECT_NAME=JavaTeachingSolution
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/vscode/.local/bin
      - GOMAXPROCS=2
      - NODE_OPTIONS=--max-old-space-size=4096
      - CUDA_VISIBLE_DEVICES=-1
      - NO_GPU=1
      - DOCKER_HOST=tcp://ops-docker-socket-proxy:2375

    # --- 4. 目录挂载 (纯净云端化) ---
    volumes:
      - /etc/localtime:/etc/localtime:ro

      - ${JAVA_M2}:/home/vscode/.m2
      - ${NODE_NPM}:/home/vscode/.npm
      - ${MNG_HOME}/volumes/share/git/gitconfig:/home/vscode/.gitconfig:ro
      - ${MNG_HOME}/volumes/share/git/.git-credentials:/home/vscode/.git-credentials:ro
      - ${WORK_SPACE_HOME}/JavaTeachingSolution:/workspaces/JavaTeachingSolution
    
    # --- 5. 自动化启动脚本 (权限与就绪) ---
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo 'vscode ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/nopasswd-vscode
        chown vscode:vscode /home/vscode/.cache
        chown -R vscode:vscode /workspaces/$$PROJECT_NAME 2>/dev/null
        exec tail -f /dev/null

    networks:
      - nms

networks:
  nms:
    external: true
