# NeoCompanion 开发容器
# 技术栈：Python 3.12（AI Gateway + Ollama 集成）
# 用途：NeoCompanion 开发环境，bind mount 项目目录，日志接入 Loki

services:
  neocompanion-dev:
    build:
      context: ../devcontainer
      dockerfile: NeoCompanion.Dockerfile
    container_name: neocompanion-dev
    volumes:
      - /home/nick/WorkSpace/NeoCompanion:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=neocompanion"
