# NeoCompanion 开发容器
# 技术栈：Python 3.12（AI Gateway + Ollama 集成）
# 用途：NeoCompanion 开发环境，bind mount 项目目录，日志接入 Loki

services:
  neocompanion-dev:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    container_name: neocompanion-dev
    volumes:
      - /home/nick/WorkSpace/NeoCompanion:/workspace:cached
    working_dir: /workspace
    command: >
      /bin/bash -c "
      for i in {1..60}; do
        if ps ax | grep -iE 'vscode-server|cursor|antigravity' | grep -v grep > /dev/null; then break; fi;
        sleep 2;
      done;
      while ps ax | grep -iE 'vscode-server|cursor|antigravity' | grep -v grep > /dev/null; do
        sleep 5;
      done;
      sleep 5;
      exit 0;
      "
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=neocompanion"
