services:
  # 共享层：ChromaDB 向量数据库
  # 数据库采用 Named Volume，挂载点指向 volumes/share/chromadb
  chromadb:
    image: chromadb/chroma:latest
    container_name: share-chromadb
    labels:
      - "nms-bridge.collect=true"
      - "nms-bridge.layer=share"
      - "nms-bridge.proxy=false"
    env_file: .env
    restart: always
    ports:
      - "5002:8000"
    environment:
      - ALLOW_RESET=${ALLOW_RESET}
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/volumes/chroma
      - CHROMA_SERVER_HOST=0.0.0.0
    volumes:
      - share_chromadb_data:/volumes/chroma
    deploy:
      resources:
        reservations:
          memory: 256M
    oom_score_adj: -500
    networks:
      - nms-bridge

volumes:
  share_chromadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MNG_HOME}/volumes/share/chromadb

networks:
  nms-bridge:
    external: true
