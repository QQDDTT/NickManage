# 核心基础服务
# 用途：整合 k3s、Redis 及日志系统 (Loki + Grafana + Promtail)
# 启动方式：由统一的 docker-base.service 管理

services:
  # --- Kubernetes 基础设施 ---
  k3s:
    image: rancher/k3s:v1.32.2-k3s1
    container_name: k3s
    restart: always
    privileged: true
    command: server --tls-san 172.17.0.1 --tls-san 10.18.1.1
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/config
      - K3S_KUBECONFIG_MODE=644
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - /home/nick/.kube:/output
    ports:
      - "6443:6443"
      - "80:80"
      - "443:443"
    tmpfs:
      - /run
      - /var/run
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=k3s"

  # --- 公共中间件 ---
  redis:
    image: redis:7-alpine
    container_name: nickmanage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=redis"

  # --- 日志服务 ---
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: always
    user: root
    ports:
      - "3100:3100"
    volumes:
      - /home/nick/.log/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: always
    user: root
    ports:
      - "3000:3000"
    volumes:
      - /home/nick/.log/grafana:/var/lib/grafana
    env_file:
      - ../env/logging.env
    depends_on:
      - loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /home/nick/.log/promtail:/etc/promtail
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

volumes:
  k3s-server:
    name: k3s-server
  redis-data:
    name: nickmanage-redis-data
