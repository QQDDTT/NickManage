services:
  dev-demo:
    image: dev-image:latest
    container_name: dev-demo
    hostname: dev-demo
    labels:
      - "nms.collect=false"
      - "nms.layer=dev"
      - "nms.proxy=false"
    env_file: .env
    
    # --- 1. 权限与内核安全解锁 ---
    # 解决 Language Server 在定制内核（如 Surface）上被拦截的问题
    privileged: true
    security_opt:
      - seccomp:unconfined
    pid: "host" 

    # --- 2. 资源保障 (核心修复) ---
    deploy:
      resources:
        limits:
          memory: 4096M  # 提高到 4G，AI 索引非常吃内存
    ulimits:
      nofile:
        soft: 65536     # 解决 "Too many open files" 导致的 Code 1 崩溃
        hard: 65536

    ports:
      - "8000:8000"

    # --- 3. 环境变量优化 ---
    environment:
      - PROJECT_NAME=demo
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/vscode/.local/bin
      - ANTIGRAVITY_LOG_LEVEL=debug
      - GOMAXPROCS=2             # 限制 CPU 瞬间并发，保护 Surface 稳定性
      - NODE_OPTIONS=--max-old-space-size=4096 # 给 Node.js 更多堆内存
      - CUDA_VISIBLE_DEVICES=-1  # 屏蔽 GPU 探测，防止驱动冲突
      - NO_GPU=1

    # --- 4. 目录挂载 (纯净云端化) ---
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${PYTHON_PIP}:/home/vscode/.cache/pip
      - ${NODE_NPM}:/home/vscode/.npm
      - ${USER_HOME}/.gemini:/home/vscode/.gemini
      - ${MNG_DIR}/volumes/share/git/gitconfig:/home/vscode/.gitconfig:ro
      - ${MNG_DIR}/volumes/share/git/.git-credentials:/home/vscode/.git-credentials:ro
    
    # --- 5. 自动化启动脚本 (权限与就绪) ---
    entrypoint: >
      /bin/sh -c "
      chown -R vscode:vscode /workspaces/$$PROJECT_NAME 2>/dev/null;
      exec tail -f /dev/null
      "

    networks:
      - nms

networks:
  nms:
    external: true