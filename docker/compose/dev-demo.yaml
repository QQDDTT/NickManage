services:
  dev-demo:
    image: ubuntu:24.04
    container_name: dev-demo
    hostname: dev-demo
    labels:
      - "nms-bridge.collect=true"
      - "nms-bridge.layer=dev"
      - "nms-bridge.proxy=true"
      - "traefik.enable=true"
      - "traefik.http.routers.dev-demo.rule=Host(`demo.local`)"
      - "traefik.http.routers.dev-demo.entrypoints=web"
      - "traefik.http.services.dev-demo.loadbalancer.server.port=8000"
      # 并发限制 (Guest Limit)
      - "traefik.http.middlewares.guest-limit.ratelimit.average=10"
      - "traefik.http.middlewares.guest-limit.ratelimit.burst=20"
      - "traefik.http.middlewares.guest-limit.ratelimit.period=1s"
      - "traefik.http.routers.dev-demo.middlewares=guest-limit"
    env_file: .env
    
    # --- 1. 权限与内核安全解锁 ---
    privileged: true
    security_opt:
      - seccomp:unconfined
    pid: "host" 

    # --- 2. 资源保障 ---
    deploy:
      resources:
        limits:
          memory: 4096M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    ports:
      - "8010:8000"

    # --- 3. 环境变量优化 ---
    environment:
      - PROJECT_NAME=demo
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/vscode/.local/bin
      - GOMAXPROCS=2
      - NODE_OPTIONS=--max-old-space-size=4096
      - CUDA_VISIBLE_DEVICES=-1
      - NO_GPU=1
      - DOCKER_HOST=tcp://ops-docker-socket-proxy:2375

    # --- 4. 目录挂载 ---
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${PYTHON_PIP}:/home/vscode/.cache/pip
      - ${NODE_NPM}:/home/vscode/.npm
      - ${MNG_HOME}/volumes/share/git/gitconfig:/home/vscode/.gitconfig:ro
      - ${MNG_HOME}/volumes/share/git/.git-credentials:/home/vscode/.git-credentials:ro
      - ${WORK_SPACE_HOME}/demo:/workspaces/demo
    
    # --- 5. 自动化启动脚本 ---
    entrypoint:
      - /bin/sh
      - -c
      - |
        apt-get update && apt-get install -y python3
        mkdir -p /etc/sudoers.d
        id -u vscode >/dev/null 2>&1 || useradd -m -s /bin/bash vscode
        echo 'vscode ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/nopasswd-vscode
        mkdir -p /home/vscode/.cache
        chown -R vscode:vscode /home/vscode
        chown -R vscode:vscode /workspaces/$$PROJECT_NAME 2>/dev/null
        exec tail -f /dev/null

    networks:
      - nms-bridge

networks:
  nms-bridge:
    external: true
