# AlpacaLens 开发容器
# 技术栈：Python 3.12
# 用途：Python 量化/分析开发环境，bind mount 项目目录，日志接入 Loki

services:
  alpacalens-dev:
    build:
      context: ../devcontainer
      dockerfile: AlpacaLens.Dockerfile
    container_name: alpacalens-dev
    volumes:
      - /home/nick/WorkSpace/AlpacaLens:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=alpacalens"
