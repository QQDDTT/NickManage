# CSharpTeachingSolution 开发容器
# 技术栈：C# / .NET SDK 8.0
# 用途：C# 教学项目开发环境，bind mount 项目目录，日志接入 Loki

services:
  csharp-teaching-dev:
    build:
      context: ../devcontainer
      dockerfile: CSharpTeachingSolution.Dockerfile
    container_name: csharp-teaching-dev
    volumes:
      - /home/nick/WorkSpace/CSharpTeachingSolution:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=csharp-teaching"
