# LifeScript 开发容器
# 技术栈：Python 3.12（AI 代理 + 向量数据库代理服务）
# 用途：LifeScript 开发环境，bind mount 项目目录，日志接入 Loki

services:
  lifescript-dev:
    build:
      context: ../devcontainer
      dockerfile: LifeScript.Dockerfile
    container_name: lifescript-dev
    volumes:
      - /home/nick/WorkSpace/LifeScript:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "project=lifescript"
